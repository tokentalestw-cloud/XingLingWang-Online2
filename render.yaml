services:
  - type: web
    name: xinglingwang-v10-storage-sync
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python3 -m uvicorn app:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    envVars:
      - key: WEB_CONCURRENCY
        value: "1"
      # Optional: set REDIS_URL in Render Environment if you add Redis later.
