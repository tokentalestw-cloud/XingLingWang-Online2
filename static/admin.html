<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>星靈王 - 資料庫重建管理面板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;900&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0808;
      --panel-bg: rgba(18, 14, 14, 0.85);
      --gold-accent: #ffd76a;
      --gold-hover: #ffea9f;
      --border-color: rgba(255, 215, 106, 0.25);
      --text-main: #f0f0f0;
      --text-muted: #aaaaaa;
      --red-accent: #ff5c5c;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      background-image: radial-gradient(circle at 50% 30%, #1a1212 0%, #0a0808 80%);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      background: rgba(10, 8, 8, 0.95);
      border-bottom: 2px solid var(--gold-accent);
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
    }

    header h1 {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      color: var(--gold-accent);
      text-shadow: 0 0 10px rgba(255, 215, 106, 0.4);
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .back-btn {
      background: transparent;
      border: 1px solid var(--gold-accent);
      color: var(--gold-accent);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      font-size: 13px;
      transition: all 0.3s ease;
    }

    .back-btn:hover {
      background: var(--gold-accent);
      color: var(--bg-dark);
      box-shadow: 0 0 12px var(--gold-accent);
    }

    .progress-bar-container {
      flex: 1;
      max-width: 400px;
      margin: 0 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      height: 18px;
      overflow: hidden;
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #d4af37, var(--gold-accent));
      width: 0%;
      transition: width 0.5s ease;
      box-shadow: 0 0 8px var(--gold-accent);
    }

    .progress-text {
      position: absolute;
      width: 100%;
      text-align: center;
      font-size: 11px;
      font-weight: bold;
      line-height: 16px;
      color: #ffffff;
      text-shadow: 1px 1px 2px #000;
    }

    .main-container {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* 左側照片清單 */
    aside {
      width: 290px;
      border-right: 1.5px solid var(--border-color);
      background: rgba(12, 10, 10, 0.9);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .aside-title {
      padding: 12px 15px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--gold-accent);
      border-bottom: 1px solid rgba(255, 215, 106, 0.15);
      background: rgba(255, 215, 106, 0.03);
    }

    .subdir-group {
      margin-bottom: 10px;
    }

    .subdir-header {
      padding: 8px 15px;
      font-size: 12px;
      font-weight: bold;
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
    }

    .photo-list {
      list-style: none;
    }

    .photo-item {
      padding: 8px 12px 8px 20px;
      font-size: 12px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      color: #cccccc;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s ease;
    }

    .photo-item .card-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      margin-right: 5px;
      transition: transform 0.2s ease;
    }

    .photo-item .status-badge {
      flex-shrink: 0;
    }

    .photo-item:hover {
      background: rgba(255, 215, 106, 0.07);
      color: var(--gold-accent);
    }
    
    .photo-item:hover .card-name {
      transform: translateX(4px);
    }

    .photo-item.active {
      background: rgba(255, 215, 106, 0.15);
      color: var(--gold-accent);
      border-left: 3px solid var(--gold-accent);
      font-weight: bold;
    }

    /* 中央照片加載區 */
    .preview-pane {
      flex: 1.2;
      border-right: 1.5px solid var(--border-color);
      background: #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .preview-pane img {
      max-width: 95%;
      max-height: 95%;
      object-fit: contain;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: transform 0.2s ease;
    }

    .zoom-hint {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 11px;
      color: var(--text-muted);
      border: 1px solid rgba(255, 255, 255, 0.1);
      pointer-events: none;
    }

    /* 右側表單區 */
    .form-pane {
      flex: 1;
      background: var(--panel-bg);
      backdrop-filter: blur(15px);
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .form-title {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      color: var(--gold-accent);
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 8px;
      margin-bottom: 5px;
      text-shadow: 0 0 5px rgba(255, 215, 106, 0.3);
    }

    .form-row {
      display: flex;
      gap: 15px;
    }

    .form-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group.checkbox-group {
      flex-direction: row;
      align-items: center;
      gap: 10px;
      padding-top: 25px;
    }

    label {
      font-size: 12px;
      font-weight: bold;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 215, 106, 0.2);
      border-radius: 6px;
      padding: 10px 12px;
      color: #ffffff;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: all 0.3s ease;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus,
    textarea:focus {
      border-color: var(--gold-accent);
      background: rgba(255, 255, 255, 0.09);
      box-shadow: 0 0 8px rgba(255, 215, 106, 0.2);
    }

    input[disabled] {
      background: rgba(255, 255, 255, 0.01);
      border-color: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.2);
      cursor: not-allowed;
    }

    .lookup-row {
      display: flex;
      gap: 8px;
    }

    .lookup-btn {
      background: rgba(255, 215, 106, 0.1);
      border: 1px solid var(--gold-accent);
      color: var(--gold-accent);
      border-radius: 6px;
      padding: 0 15px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .lookup-btn:hover {
      background: var(--gold-accent);
      color: var(--bg-dark);
      box-shadow: 0 0 10px var(--gold-accent);
    }

    .submit-btn {
      background: linear-gradient(135deg, #d4af37, var(--gold-accent));
      border: none;
      color: var(--bg-dark);
      padding: 14px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(255, 215, 106, 0.2);
      margin-top: 10px;
    }

    .submit-btn:hover {
      background: linear-gradient(135deg, var(--gold-accent), #fff2c4);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 215, 106, 0.4);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .toast {
      position: fixed;
      bottom: 25px;
      right: 25px;
      background: rgba(20, 100, 20, 0.95);
      border: 1px solid #28a745;
      padding: 12px 25px;
      border-radius: 8px;
      color: #ffffff;
      font-size: 13px;
      font-weight: bold;
      z-index: 1000;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.error {
      background: rgba(100, 20, 20, 0.95);
      border-color: var(--red-accent);
    }

    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .empty-state h3 {
      color: var(--gold-accent);
      font-family: 'Cinzel', serif;
    }
  </style>
</head>
<body>

  <!-- 上方工具列 -->
  <header>
    <h1>
      <span>XINGLINGWANG</span>
      <span style="color: rgba(255,255,255,0.2); font-size: 14px;">|</span>
      <span style="font-size: 16px; color: #ffffff;">資料庫編輯器與對齊工具</span>
    </h1>
    
    <!-- 進度條 -->
    <div class="progress-bar-container" id="progressBarContainer" style="display: none;">
      <div class="progress-text" id="progressText">處理進度: 0 / 0 (0%)</div>
      <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
    </div>

    <div style="display: flex; gap: 10px; align-items: center;">
      <a href="/static/deck_builder.html?v=8.12" class="back-btn" style="border-color: #ffd76a;">牌組編輯器</a>
      <a href="/" class="back-btn">返回對戰大廳</a>
    </div>
  </header>

  <div class="main-container">
    
    <!-- 左側清單 -->
    <aside>
      <div class="aside-title">相片資料庫</div>
      <div style="display: flex; border-bottom: 1px solid var(--border-color); background: rgba(0,0,0,0.3);">
        <button id="tabUnprocessed" onclick="switchTab('unprocessed')" style="flex: 1; background: none; border: none; border-bottom: 2px solid var(--gold-accent); color: var(--gold-accent); padding: 10px 5px; font-size: 12px; font-weight: bold; cursor: pointer; outline: none; transition: all 0.2s;">待處理</button>
        <button id="tabProcessed" onclick="switchTab('processed')" style="flex: 1; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-muted); padding: 10px 5px; font-size: 12px; font-weight: bold; cursor: pointer; outline: none; transition: all 0.2s;">已入庫</button>
      </div>
      <div style="padding: 8px 12px; border-bottom: 1px solid rgba(255, 215, 106, 0.1);">
        <input type="text" id="sidebarSearch" placeholder="🔍 搜尋名稱、ID、或檔名..." oninput="filterPhotos(this.value)" style="padding: 6px 10px; font-size: 11px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255, 215, 106, 0.25); border-radius: 4px; color: #fff; width: 100%; outline: none; transition: all 0.3s;" onfocus="this.style.borderColor='var(--gold-accent)';" onblur="this.style.borderColor='rgba(255, 215, 106, 0.25)';">
      </div>
      <div id="unprocessedContainer" style="flex: 1; overflow-y: auto;">
        <div style="text-align: center; padding: 30px; color: var(--text-muted); font-size: 13px;">載入中...</div>
      </div>
    </aside>

    <!-- 中央相片預覽 -->
    <main class="preview-pane">
      <div id="noImagePlaceholder" class="empty-state">
        <h3>尚未選取相片</h3>
        <p>請點選左側待處理相片，開始錄入卡牌資料。</p>
      </div>
      <img id="cardPreview" src="" alt="Card Preview" style="display: none; cursor: zoom-in;" onclick="toggleZoom(this)">
      <div class="zoom-hint" id="zoomHint" style="display: none;">點擊圖片可放大/縮小檢視</div>
    </main>

    <!-- 右側表單 -->
    <section class="form-pane" id="formPane" style="pointer-events: none; opacity: 0.5;">
      <div class="form-title" id="paneTitle">卡牌錄入表單</div>
      
      <!-- 陣營選擇 -->
      <div class="form-group">
        <label for="cDeck">所屬種族牌組 (Faction)</label>
        <select id="cDeck" onchange="syncFaction(this.value)">
          <option value="喵喵賊">喵喵賊</option>
          <option value="妖怪村莊">妖怪村莊</option>
          <option value="藝術品">藝術品</option>
          <option value="獸人">獸人</option>
          <option value="虛擬世界">虛擬世界</option>
          <option value="中立單位">中立單位</option>
        </select>
      </div>

      <!-- 編碼與自動帶入 -->
      <div class="form-row">
        <div class="form-group" style="flex: 1.2;">
          <label for="cId">卡牌編碼 (ID - 最右下角，如 ART-0001)</label>
          <input type="text" id="cId" placeholder="例如 ART-0001 或 CAT-001" required>
        </div>
        <div class="form-group">
          <label for="cType">卡片類型</label>
          <select id="cType" onchange="toggleCardType(this.value)">
            <option value="unit">單位 (Unit)</option>
            <option value="magic">魔法 (Magic)</option>
          </select>
        </div>
      </div>

      <!-- 名稱與智慧查表帶入 -->
      <div class="form-group">
        <label for="cName">卡牌名稱 (Name - 中央文字)</label>
        <div class="lookup-row">
          <input type="text" id="cName" placeholder="輸入中央文字，點選右方可自動帶入舊資料庫屬性" required style="flex: 1;">
          <button type="button" class="lookup-btn" onclick="lookupCardData()">智慧自動填表</button>
        </div>
      </div>

      <!-- 戰鬥數值 -->
      <div class="form-row" id="combatRow">
        <div class="form-group">
          <label for="cAttack">攻擊力 (頂端刀劍，或勾選盾牌)</label>
          <div style="display: flex; gap: 10px; align-items: center;">
            <input type="number" id="cAttack" placeholder="數字" style="flex: 1;" min="0">
            <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; white-space: nowrap;">
              <input type="checkbox" id="cIsShield" onchange="toggleShield(this.checked)"> 是盾牌 (🛡)
            </label>
          </div>
        </div>
        <div class="form-group">
          <label for="cTribute">需獻祭數 (右上角紅星)</label>
          <input type="number" id="cTribute" value="0" min="0" max="5">
        </div>
        <div class="form-group">
          <label for="cScore">星星分數 (底端星)</label>
          <input type="number" id="cScore" value="1" min="0" max="10">
        </div>
      </div>
        <!-- 法力點數與使用時機 -->
        <div class="form-row">
          <div class="form-group" style="flex: 1;">
            <label for="cMana">法力點數 (Mana)</label>
            <input type="number" id="cMana" placeholder="0" min="0" value="0" style="flex: 1;" />
          </div>
          <div class="form-group" style="flex: 2;">
            <label>可使用時機 (Usable Phases)</label>
            <div style="display: flex; gap: 8px; flex-wrap: wrap;">
               <label><input type="checkbox" value="Main Phase" class="phase-checkbox"/> 主要階段</label>
               <label><input type="checkbox" value="Defense Phase" class="phase-checkbox"/> 防守階段</label>
               <label><input type="checkbox" value="Enemy Phase" class="phase-checkbox"/> 敵方階段</label>
               <label><input type="checkbox" value="Opponent Play Unit" class="phase-checkbox"/> 對方打出單位時</label>
               <label><input type="checkbox" value="Opponent Summon Phase" class="phase-checkbox"/> 對手召喚階段時</label>
               <label><input type="checkbox" value="Summon Phase" class="phase-checkbox"/> 召喚階段時</label>
               <label><input type="checkbox" value="Opponent Use Magic" class="phase-checkbox"/> 對手使用魔法卡時</label>
               <label><input type="checkbox" value="Opponent End Phase End" class="phase-checkbox"/> 對手結束階段結束時</label>
               <label><input type="checkbox" value="Opponent Early End" class="phase-checkbox"/> 對手宣告提前結束時</label>
            </div>
          </div>
        </div>

      <!-- 額外牌組判定 -->
      <div class="form-row">
        <div class="form-group checkbox-group" style="flex: 1.2;">
          <label style="cursor: pointer; display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="cIsExtra" onchange="toggleExtraDeck(this.checked)">
            <b style="color: #ffd76a;">★ 這是「額外牌組」卡牌 (左側有黃星)</b>
          </label>
        </div>
        <div class="form-group">
          <label for="cExtraLimit">額外張數限制 (黃星內數字)</label>
          <input type="number" id="cExtraLimit" value="3" min="1" max="5" disabled>
        </div>
        <div class="form-group">
            <label for="cTriggerCondition">額外召喚條件</label>
            <input type="text" id="cTriggerCondition" placeholder="例如：僅能透過效果召喚" disabled>
        </div>
      </div>

      <!-- 特定類型與關鍵字 -->
      <div class="form-row">
        <div class="form-group">
          <label for="cSubtype">特定類型 (右下角字樣)</label>
          <input type="text" id="cSubtype" placeholder="例如：貓賊、戰士、畫家 等">
        </div>
        <div class="form-group">
          <label for="cKeywords">關鍵字 (多個以逗號隔開)</label>
          <input type="text" id="cKeywords" placeholder="例如：偷竊, 盾牌, 空中戰線 等">
        </div>
      </div>

      <!-- 效果文字 -->
      <div class="form-group">
        <label for="cEffectText">卡牌效果說明文字</label>
        <textarea id="cEffectText" rows="3" placeholder="請精確輸入卡片中央的說明效果文字..."></textarea>
      </div>

      <!-- 隱藏的原始檔路徑 -->
      <input type="hidden" id="cOriginalFile">

      <!-- 提交按鈕 -->
      <button type="button" class="submit-btn" onclick="saveCard()">儲存卡片並載入下一張 (Ctrl + S)</button>

    </section>

  </div>

  <!-- Toast 訊息提示 -->
  <div id="toast" class="toast">✔ 儲存成功！</div>

  <script>
    const UNIMPLEMENTED_CARD_IDS = new Set([]);

    let unprocessedList = [];
    let processedList = [];
    let currentPhoto = null;
    let databaseCards = [];
    let activeSubdirs = { "喵喵賊": true, "妖怪村莊": true, "藝術品": true, "中立單位": true, "獸人": true, "虛擬世界": true };
    let isZoomed = false;
    let currentTab = "unprocessed";
    let searchFilter = "";
    let currentEditingCardId = null;

    // 切換分頁
    function switchTab(tab) {
      currentTab = tab;
      const tUnprocessed = document.getElementById("tabUnprocessed");
      const tProcessed = document.getElementById("tabProcessed");
      
      if (tab === "unprocessed") {
        tUnprocessed.style.color = "var(--gold-accent)";
        tUnprocessed.style.borderBottomColor = "var(--gold-accent)";
        tProcessed.style.color = "var(--text-muted)";
        tProcessed.style.borderBottomColor = "transparent";
      } else {
        tProcessed.style.color = "var(--gold-accent)";
        tProcessed.style.borderBottomColor = "var(--gold-accent)";
        tUnprocessed.style.color = "var(--text-muted)";
        tUnprocessed.style.borderBottomColor = "transparent";
      }
      renderPhotoList();
    }

    // 關鍵字過濾
    function filterPhotos(val) {
      searchFilter = val.trim().toLowerCase();
      renderPhotoList();
    }

    // 初始化加載
    async function loadAdminData() {
      try {
        // 載入當前資料庫卡牌，用於智慧填表
        databaseCards = await fetch("/api/cards").then(r => r.json());
        
        // 載入照片列表
        const res = await fetch("/api/admin/unprocessed").then(r => r.json());
        if (res.status === "success") {
          unprocessedList = res.unprocessed;
          processedList = res.processed || [];
          renderPhotoList();
          updateProgressBar();
        } else {
          showToast(res.message, true);
        }
      } catch (err) {
        showToast("加載本機 Downloads/星靈王圖片 目錄失敗，請確認該路徑存在且 app 正常運行中！", true);
      }
    }

    // 渲染照片清單
    function renderPhotoList() {
      const container = document.getElementById("unprocessedContainer");
      let listToRender = currentTab === "unprocessed" ? unprocessedList : processedList;

      // 搜尋關鍵字過濾
      if (searchFilter) {
        listToRender = listToRender.filter(p => {
          const filenameMatch = p.filename.toLowerCase().includes(searchFilter);
          const existing = databaseCards.find(c => c.original_file === p.rel_path);
          if (existing) {
            const nameMatch = (existing.name || "").toLowerCase().includes(searchFilter);
            const idMatch = (existing.id || "").toLowerCase().includes(searchFilter);
            return filenameMatch || nameMatch || idMatch;
          }
          return filenameMatch;
        });
      }

      if (listToRender.length === 0) {
        if (currentTab === "unprocessed") {
          container.innerHTML = `
            <div class="empty-state">
              <h3 style="font-size: 14px;">${searchFilter ? '未找到符合的未處理相片' : '恭喜您！'}</h3>
              <p style="font-size: 11px;">${searchFilter ? '請更換搜尋詞後重試。' : '星靈王圖片目錄下的相片已全數處理完畢！'}</p>
            </div>
          `;
        } else {
          container.innerHTML = `
            <div class="empty-state">
              <h3 style="font-size: 14px;">${searchFilter ? '未找到符合的已入庫卡片' : '尚無入庫資料'}</h3>
              <p style="font-size: 11px;">${searchFilter ? '請更換搜尋詞後重試。' : '此分頁將顯示已儲存入庫的卡片。'}</p>
            </div>
          `;
        }
        return;
      }

      // 依子目錄分組
      const groups = { "喵喵賊": [], "妖怪村莊": [], "藝術品": [], "中立單位": [], "獸人": [], "虛擬世界": [] };
      listToRender.forEach(item => {
        if (groups[item.subdir]) {
          groups[item.subdir].push(item);
        }
      });

      let html = "";
      for (const subdir in groups) {
        const list = groups[subdir];
        const collapsed = !activeSubdirs[subdir];
        html += `
          <div class="subdir-group">
            <div class="subdir-header" onclick="toggleSubdir('${subdir}')">
              <span>📂 ${subdir} (${list.length})</span>
              <span>${collapsed ? '▶' : '▼'}</span>
            </div>
            <ul class="photo-list" style="display: ${collapsed ? 'none' : 'block'};">
              ${list.map(p => {
                const existing = databaseCards.find(c => c.original_file === p.rel_path);
                let nameHtml = "";
                let statusHtml = "";
                if (existing) {
                  const isImplemented = !UNIMPLEMENTED_CARD_IDS.has(existing.id);
                  nameHtml = `🏷️ [${existing.id}] ${existing.name}`;
                  statusHtml = isImplemented 
                    ? `<span style="color: #4caf50; font-size: 10px;">[✅ 已實裝]</span>` 
                    : `<span style="color: #ff9800; font-size: 10px;">[❌ 未實裝]</span>`;
                } else {
                  nameHtml = `📷 ${p.filename}`;
                }
                const displayHtml = `
                  <span class="card-name" title="${existing ? existing.name : p.filename}">${nameHtml}</span>
                  <span class="status-badge">${statusHtml}</span>
                `;
                return `
                  <li class="photo-item ${currentPhoto && currentPhoto.rel_path === p.rel_path ? 'active' : ''}" 
                      onclick="selectPhoto(${JSON.stringify(p).replace(/"/g, '&quot;')})">
                    ${displayHtml}
                  </li>
                `;
              }).join('')}
            </ul>
          </div>
        `;
      }
      container.innerHTML = html;
    }

    // 切換分組展開/摺疊
    function toggleSubdir(subdir) {
      activeSubdirs[subdir] = !activeSubdirs[subdir];
      renderPhotoList();
    }

    // 更新進度條
    function updateProgressBar() {
      const bar = document.getElementById("progressBarContainer");
      const fill = document.getElementById("progressFill");
      const text = document.getElementById("progressText");

      // 從 cards.json 和待處理列表中估算總數
      const processedCount = databaseCards.filter(c => c.original_file).length;
      const totalCount = processedCount + unprocessedList.length;

      if (totalCount === 0) {
        bar.style.display = "none";
        return;
      }

      bar.style.display = "block";
      const pct = Math.round((processedCount / totalCount) * 100);
      fill.style.width = pct + "%";
      text.textContent = `建庫進度: ${processedCount} / ${totalCount} 張卡片已入庫 (${pct}%)`;
    }

    // 選取相片
    function selectPhoto(photo) {
      currentPhoto = photo;
      
      // 更新選中狀態高亮
      document.querySelectorAll(".photo-item").forEach(item => item.classList.remove("active"));
      renderPhotoList();

      // 尋找是否已有這張卡牌的已入庫資料
      const existing = databaseCards.find(c => (photo.id && c.id === photo.id) || (photo.rel_path && c.original_file === photo.rel_path));

      // 載入預覽圖片
      const img = document.getElementById("cardPreview");
      const placeholder = document.getElementById("noImagePlaceholder");
      const zoomHint = document.getElementById("zoomHint");

      if (existing && existing.image) {
        img.src = existing.image;
      } else {
        img.src = `/api/admin/image/${photo.subdir}/${photo.filename}`;
      }
      img.style.display = "block";
      placeholder.style.display = "none";
      zoomHint.style.display = "block";

      // 啟用右側表單
      const pane = document.getElementById("formPane");
      pane.style.pointerEvents = "auto";
      pane.style.opacity = "1";

      // 重置並預填表單
      document.getElementById("cDeck").value = photo.subdir;
      document.getElementById("cOriginalFile").value = photo.rel_path || "";

      if (existing) {
        currentEditingCardId = existing.id;
        // 已有資料：載入已存屬性，方便勘誤
        // 若後端 deck 為 "中立"，在 UI 中顯示為 "中立單位"
        const deckVal = existing.deck === "中立" ? "中立單位" : (existing.deck || "unit");
        document.getElementById("cDeck").value = deckVal;
        document.getElementById("cId").value = existing.id || "";
        document.getElementById("cName").value = existing.name || "";
        document.getElementById("cType").value = existing.type || "unit";
        toggleCardType(existing.type || "unit");
        
        if (existing.attack === "盾" || existing.attack === "盾牌") {
          document.getElementById("cIsShield").checked = true;
          toggleShield(true);
        } else {
          document.getElementById("cIsShield").checked = false;
          toggleShield(false);
          document.getElementById("cAttack").value = existing.attack || "";
        }
        document.getElementById("cTribute").value = existing.tribute || 0;
        document.getElementById("cScore").value = existing.score || 0;
        document.getElementById("cMana").value = existing.mana !== undefined ? existing.mana : 0;
        // set usable phases checkboxes
        const phases = existing.usable_phases || [];
        document.querySelectorAll('.phase-checkbox').forEach(cb => {
          cb.checked = phases.includes(cb.value);
        });
        
        const isExtra = existing.deck_eligible === false;
        document.getElementById("cIsExtra").checked = isExtra;
        toggleExtraDeck(isExtra);
        document.getElementById("cExtraLimit").value = existing.extra_deck_limit || 3;
        document.getElementById("cTriggerCondition").value = existing.trigger_condition || "";

        document.getElementById("cSubtype").value = existing.art_subtype || "";
        document.getElementById("cKeywords").value = (existing.keywords || []).join(", ");
        document.getElementById("cEffectText").value = existing.effect_text || "";
        
        showToast(`📂 已載入《${existing.name}》的已入庫資料，可直接修改並儲存勘誤。`);
      } else {
        currentEditingCardId = null;
        // 全新卡片：清空舊輸入並自動預測
        document.getElementById("cId").value = "";
        document.getElementById("cName").value = "";
        document.getElementById("cType").value = "unit";
        toggleCardType("unit");
        document.getElementById("cAttack").value = "";
        document.getElementById("cIsShield").checked = false;
        toggleShield(false);
        document.getElementById("cTribute").value = "0";
        document.getElementById("cScore").value = "1";
        document.getElementById("cMana").value = "0";
        document.querySelectorAll('.phase-checkbox').forEach(cb => {
          cb.checked = false;
        });
        document.getElementById("cIsExtra").checked = false;
        toggleExtraDeck(false);
        document.getElementById("cExtraLimit").value = "3";
        document.getElementById("cTriggerCondition").value = "";
        document.getElementById("cSubtype").value = "";
        document.getElementById("cKeywords").value = "";
        document.getElementById("cEffectText").value = "";

        // 自動預測 ID
        let prefix = "CAT-";
        if (photo.subdir === "妖怪村莊") prefix = "VLG-";
        if (photo.subdir === "藝術品") prefix = "ART-";
        if (photo.subdir === "中立單位") prefix = "NEU-";
        if (photo.subdir === "獸人") prefix = "ORC-";
        if (photo.subdir === "虛擬世界") prefix = "VIR-";
        
        // 尋找同前綴中最大的數字，給予自動加 1 的推薦
        const同種族卡牌 = databaseCards.filter(c => c.id && c.id.startsWith(prefix));
        if (同種族卡牌.length > 0) {
          const nums =同種族卡牌.map(c => parseInt(c.id.replace(prefix, ""), 10)).filter(Number.isFinite);
          const maxNum = nums.length > 0 ? Math.max(...nums) : 0;
          const nextNum = maxNum + 1;
          // 保持與既有卡牌格式長度對齊
          const suffixLength = (prefix === "ART-" || prefix === "NEU-") ? 4 : 3;
          const suffix = String(nextNum).padStart(suffixLength, "0");
          document.getElementById("cId").value = prefix + suffix;
        } else {
          document.getElementById("cId").value = prefix + ((prefix === "ART-" || prefix === "NEU-") ? "0001" : "001");
        }
      }

      // 自動聚焦在卡片名稱輸入框上
      setTimeout(() => {
        document.getElementById("cName").focus();
      }, 50);
    }

    // 縮放相片
    function toggleZoom(img) {
      if (isZoomed) {
        img.style.transform = "scale(1)";
        img.style.cursor = "zoom-in";
      } else {
        img.style.transform = "scale(1.8)";
        img.style.cursor = "zoom-out";
      }
      isZoomed = !isZoomed;
    }

    // 連動選單：種族改變自動變換卡牌 ID 首碼
    function syncFaction(val) {
      let prefix = "CAT-";
      if (val === "妖怪村莊") prefix = "VLG-";
      if (val === "藝術品") prefix = "ART-";
      if (val === "中立單位") prefix = "NEU-";
      if (val === "獸人") prefix = "ORC-";
      if (val === "虛擬世界") prefix = "VIR-";
      
      const同種族卡牌 = databaseCards.filter(c => c.id && c.id.startsWith(prefix));
      if (同種族卡牌.length > 0) {
        const nums = 同種族卡牌.map(c => parseInt(c.id.replace(prefix, ""), 10)).filter(Number.isFinite);
        const maxNum = Math.max(...nums);
        const suffixLength = (prefix === "ART-" || prefix === "NEU-") ? 4 : 3;
        const suffix = String(maxNum + 1).padStart(suffixLength, "0");
        document.getElementById("cId").value = prefix + suffix;
      } else {
        document.getElementById("cId").value = prefix + ((prefix === "ART-" || prefix === "NEU-") ? "0001" : "001");
      }
    }

    // 卡片類型連動：若是魔法卡，隱藏攻擊力與祭品，修改預設分數為 0
    function toggleCardType(val) {
      const combatRow = document.getElementById("combatRow");
      if (val === "magic") {
        combatRow.style.opacity = "0.4";
        document.getElementById("cAttack").disabled = true;
        document.getElementById("cIsShield").disabled = true;
        document.getElementById("cTribute").disabled = true;
        document.getElementById("cAttack").value = "0";
        document.getElementById("cTribute").value = "0";
        document.getElementById("cScore").value = "0";
      } else {
        combatRow.style.opacity = "1";
        document.getElementById("cAttack").disabled = false;
        document.getElementById("cIsShield").disabled = false;
        document.getElementById("cTribute").disabled = false;
        document.getElementById("cAttack").value = "";
        document.getElementById("cTribute").value = "0";
        document.getElementById("cScore").value = "1";
      }
    }

    // 盾牌單位連動：若是盾牌，攻擊力鎖定為 "盾"
    function toggleShield(checked) {
      const atkInput = document.getElementById("cAttack");
      if (checked) {
        atkInput.disabled = true;
        atkInput.value = "";
        atkInput.placeholder = "🛡 盾牌單位";
      } else {
        atkInput.disabled = false;
        atkInput.placeholder = "數字";
      }
    }

    // 額外牌組連動：啟用/禁用最大拷貝張數
    function toggleExtraDeck(checked) {
      document.getElementById("cExtraLimit").disabled = !checked;
      document.getElementById("cTriggerCondition").disabled = !checked;
    }

    // 智慧自動填表 (比對舊資料庫中名字相同的卡片屬性)
    function lookupCardData() {
      const name = document.getElementById("cName").value.trim();
      if (!name) {
        showToast("請先輸入卡片中央的中文名稱，才能進行智慧自動填表！", true);
        return;
      }

      // 模糊或精確比對
      const match = databaseCards.find(c => c.name && c.name.replace(/\s+/g,"") === name.replace(/\s+/g,""));
      if (match) {
        document.getElementById("cType").value = match.type || "unit";
        toggleCardType(match.type || "unit");
        
        // 攻擊力或盾牌
        if (match.attack === "盾" || match.attack === "盾牌") {
          document.getElementById("cIsShield").checked = true;
          toggleShield(true);
        } else {
          document.getElementById("cIsShield").checked = false;
          toggleShield(false);
          document.getElementById("cAttack").value = match.attack || "";
        }

        document.getElementById("cTribute").value = match.tribute || 0;
        document.getElementById("cScore").value = match.score || 1;
        
        // 額外牌組
        const isExtra = match.deck_eligible === false;
        document.getElementById("cIsExtra").checked = isExtra;
        toggleExtraDeck(isExtra);
        if (isExtra) {
          document.getElementById("cExtraLimit").value = match.extra_deck_limit || 3;
        }

        document.getElementById("cSubtype").value = match.art_subtype || "";
        document.getElementById("cKeywords").value = (match.keywords || []).join(", ");
        document.getElementById("cEffectText").value = match.effect_text || "";
        
        showToast(`✔ 成功找到並自動填入卡片《${match.name}》的舊屬性！`);
      } else {
        showToast("資料庫中無此名稱的卡牌，請手動填寫欄位。", true);
      }
    }

    // 儲存卡牌
    async function saveCard() {
      if (!currentPhoto) return;

      const cId = document.getElementById("cId").value.trim();
      const cName = document.getElementById("cName").value.trim();
      const cDeck = document.getElementById("cDeck").value;
      const cType = document.getElementById("cType").value;
      const cOriginalFile = document.getElementById("cOriginalFile").value;

      if (!cId || !cName) {
        showToast("卡牌編碼與名稱為必填項目！", true);
        return;
      }

      // 處理攻擊力
      let atkVal = "0";
      if (cType === "unit") {
        if (document.getElementById("cIsShield").checked) {
          atkVal = "盾";
        } else {
          atkVal = document.getElementById("cAttack").value.trim();
          if (!atkVal) {
            showToast("請輸入單位攻擊力或勾選為盾牌！", true);
            return;
          }
        }
      }

      const keywords = document.getElementById("cKeywords").value
        .split(",")
        .map(k => k.trim())
        .filter(Boolean);

      const payload = {
        id: cId,
        name: cName,
        deck: cDeck,
        type: cType,
        faction: cDeck,
        attack: atkVal,
        score: parseInt(document.getElementById("cScore").value, 10) || 0,
        tribute: parseInt(document.getElementById("cTribute").value, 10) || 0,
        keywords: keywords,
        mana: parseInt(document.getElementById("cMana").value, 10) || 0,
        usable_phases: Array.from(document.querySelectorAll('.phase-checkbox')).filter(cb => cb.checked).map(cb => cb.value),
        effect_text: document.getElementById("cEffectText").value,
        is_extra_deck: document.getElementById("cIsExtra").checked,
        extra_deck_limit: parseInt(document.getElementById("cExtraLimit").value, 10) || 3,
        trigger_condition: document.getElementById("cTriggerCondition").value.trim(),
        art_subtype: document.getElementById("cSubtype").value.trim(),
        original_file: cOriginalFile,
        previous_id: currentEditingCardId
      };

      try {
        const res = await fetch("/api/admin/save", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        }).then(r => r.json());

        if (res.status === "success") {
          showToast(`✔ ${res.message}`);
          
          const oldTab = currentTab;
          const oldId = cId;
          const oldRelPath = cOriginalFile;

          // 重新載入，加載下一個
          await loadAdminData();

          if (oldTab === "processed") {
            // 已入庫分頁：保持編輯完的卡片選中狀態，以防位置跳動
            const nextPhoto = processedList.find(p => p.id === oldId || p.rel_path === oldRelPath);
            if (nextPhoto) {
              selectPhoto(nextPhoto);
            }
          } else {
            // 未處理分頁：載入下一個待錄入相片
            setTimeout(() => {
              const firstItem = document.querySelector(".photo-item");
              if (firstItem) {
                firstItem.click();
              } else {
                // 全數完成，清空預覽與表單
                document.getElementById("cardPreview").style.display = "none";
                document.getElementById("zoomHint").style.display = "none";
                document.getElementById("noImagePlaceholder").style.display = "flex";
                document.getElementById("formPane").style.pointerEvents = "none";
                document.getElementById("formPane").style.opacity = "0.5";
              }
            }, 300);
          }

        } else {
          showToast(`❌ 錯誤: ${res.detail || "無法存檔"}`, true);
        }
      } catch (err) {
        showToast("網路錯誤或後端拒絕存檔，請確認後端運行中！", true);
      }
    }

    // 顯示 Toast 訊息
    function showToast(text, isError = false) {
      const toast = document.getElementById("toast");
      toast.textContent = text;
      toast.className = "toast show" + (isError ? " error" : "");
      setTimeout(() => {
        toast.classList.remove("show");
      }, 3500);
    }

    // 綁定鍵盤快捷鍵 (Ctrl + S 存檔並繼續)
    document.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
        e.preventDefault(); // 阻止瀏覽器預設存檔
        if (currentPhoto) {
          saveCard();
        }
      }
    });

    // 啟動加載
    loadAdminData();
  </script>
</body>
</html>
